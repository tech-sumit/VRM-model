name: rl
# Target reduced from spec's 110K after audit (2026-05-03). MathVista and
# We-Math have no train split on HF (testmini only) so they cannot be used
# for RL. MM-Eureka audit stalled -- revisit once we can download it in
# isolation. For now rely on the datasets with real train splits.
target_size: 40000
difficulty_lo: 0.1
difficulty_hi: 0.85
sources:
  - source: geometry3k
    cap: 2100
  - source: geoqa
    cap: 8000
  - source: chartqa
    cap: 28000
  - source: mavis
    cap: 800
distillation:
  enabled: false
