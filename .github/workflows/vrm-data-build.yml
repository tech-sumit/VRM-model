name: vrm-data-build

on:
  workflow_dispatch:
    inputs:
      data_version:
        description: "Data version tag (e.g. v1, dev-2026-05-03)"
        required: true
        type: string
        default: "v1"
      stage:
        description: "Pipeline stage: normalize (CPU), filter (GPU H200), distill (CPU+OpenRouter), or all"
        required: true
        type: choice
        options:
          - normalize
          - filter
          - distill
          - all
        default: normalize
      include_distillation:
        description: "Run teacher distillation (only applies to distill/all stages)"
        required: true
        type: boolean
        default: true
      debug_hold:
        description: "Keep pod alive after task exits (SSH in to debug)"
        required: false
        type: boolean
        default: false

concurrency:
  group: vrm-data-${{ inputs.data_version }}-${{ inputs.stage }}
  cancel-in-progress: false

jobs:
  launch-pod:
    name: launch dataprep pod on RunPod
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.4"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv python install 3.11
      - run: uv sync --extra dev

      - name: Launch RunPod dataprep pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ORG: ${{ vars.HF_ORG }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          VRM_DISTILL_BULK_MODEL: ${{ vars.VRM_DISTILL_BULK_MODEL }}
          VRM_DISTILL_REFINE_MODEL: ${{ vars.VRM_DISTILL_REFINE_MODEL }}
          VRM_DISTILL_MAX_USD: ${{ vars.VRM_DISTILL_MAX_USD }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_PROJECT: ${{ vars.WANDB_PROJECT }}
          WANDB_ENTITY: ${{ vars.WANDB_ENTITY }}
          SLACK_WEBHOOK_VRM: ${{ secrets.SLACK_WEBHOOK_VRM }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN_FOR_DISPATCH: ${{ secrets.GH_TOKEN_FOR_DISPATCH }}
          VRM_DATAPREP_IMAGE: ${{ vars.VRM_DATAPREP_IMAGE }}
          VRM_TRAIN_IMAGE: ${{ vars.VRM_TRAIN_IMAGE }}
          VRM_NETWORK_VOLUME_ID: ${{ vars.VRM_NETWORK_VOLUME_ID }}
          VRM_REGION: ${{ vars.VRM_REGION }}
          VRM_GPU_TYPE_FILTER: ${{ vars.VRM_GPU_TYPE_FILTER }}
          VRM_GPU_COUNT_FILTER: ${{ vars.VRM_GPU_COUNT_FILTER }}
          VRM_MAX_USD_DATAPREP: ${{ vars.VRM_MAX_USD_DATAPREP }}
          VRM_GIT_REPO: https://github.com/${{ github.repository }}.git
          VRM_GIT_REF: ${{ github.sha }}
          VRM_DEBUG_HOLD: ${{ inputs.debug_hold && '1' || '' }}
        id: launch
        run: |
          DISTILL_FLAG="--include-distillation"
          if [[ "${{ inputs.include_distillation }}" == "false" ]]; then
            DISTILL_FLAG="--no-distillation"
          fi
          POD_ID=$(uv run vrm runpod launch-dataprep \
              --recipe configs/data/sft_recipe.yaml \
              --recipe configs/data/rl_recipe.yaml \
              --data-version "${{ inputs.data_version }}" \
              --stage "${{ inputs.stage }}" \
              $DISTILL_FLAG)
          echo "pod_id=$POD_ID" >> $GITHUB_OUTPUT
          echo "Launched ${{ inputs.stage }} pod $POD_ID"

      - name: Summary
        if: always()
        run: |
          {
            echo "## VRM data build launched (stage: ${{ inputs.stage }})"
            echo "- pod: \`${{ steps.launch.outputs.pod_id }}\`"
            echo "- data_version: \`${{ inputs.data_version }}\`"
            echo "- stage: \`${{ inputs.stage }}\`"
            echo "- distillation: \`${{ inputs.include_distillation }}\`"
            echo "- monitor: https://www.runpod.io/console/pods/${{ steps.launch.outputs.pod_id }}"
            echo ""
            echo "When this stage completes, trigger the next one:"
            case "${{ inputs.stage }}" in
              normalize) echo "- next: rerun this workflow with \`stage=filter\`" ;;
              filter)    echo "- next: rerun this workflow with \`stage=distill\`" ;;
              distill)   echo "- next: data is uploaded to HF Hub; run training workflows" ;;
            esac
          } >> $GITHUB_STEP_SUMMARY

